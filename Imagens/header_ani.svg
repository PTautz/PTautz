<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- fundo -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- linha animada -->
  <rect x="-300" y="90" width="300" height="3" fill="#00E5FF" opacity="0.6">
    <animate attributeName="x" from="-300" to="1200" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- nome -->
  <text x="50%" y="45%" text-anchor="middle"
        font-size="42"
        fill="#E6FBFF"
        font-family="Segoe UI, Arial"
        font-weight="bold">
    Patrícia Tautz
  </text>

  <!-- subtítulo -->
  <text x="50%" y="60%" text-anchor="middle"
        font-size="18"
        fill="#00E5FF"
        font-family="Segoe UI, Arial">
    FULL STACK DEVELOPMENT • JAVA • JAVASCRIPT • NODE.JS
  </text>

  <!-- linha inferior -->
  <line x1="200" y1="250" x2="1000" y2="250" stroke="#00E5FF" stroke-opacity="0.3"/>

</svg>
